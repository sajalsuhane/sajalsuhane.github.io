<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="630" viewBox="0 0 1200 630">
  <!--
    Source for public/images/og.png (1200x630 link-preview card).
    Convert with any of:
      rsvg-convert -w 1200 -h 630 og-source.svg -o og.png
      qlmanage -t -s 1200 -o . og-source.svg && mv og-source.svg.png og.png
      Open in a browser at 100% zoom and screenshot the 1200x630 canvas.
    Verify: sips -g pixelWidth -g pixelHeight og.png  (must be 1200x630)
    The photo is referenced relative to this file (sajal_port.jpg in the same dir).
  -->
  <defs>
    <clipPath id="photoCircle">
      <circle cx="950" cy="315" r="150"/>
    </clipPath>
  </defs>

  <!-- dark slate background -->
  <rect width="1200" height="630" fill="#020617"/>

  <!-- thin blue accent line -->
  <rect x="80" y="206" width="64" height="4" fill="#3b82f6"/>

  <!-- name -->
  <text x="80" y="304" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="78" font-weight="700" fill="#ffffff">Sajal Suhane</text>

  <!-- title -->
  <text x="80" y="372" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="38" font-weight="400" fill="#cbd5e1">Software Engineer at Goldman Sachs</text>

  <!-- metric -->
  <text x="80" y="434" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="29" font-weight="400" fill="#94a3b8">$1M+ annual savings &#183; distributed systems &amp; cloud</text>

  <!-- profile photo, circular, right side -->
  <image xlink:href="sajal_port.jpg" href="sajal_port.jpg" x="800" y="165" width="300" height="300" preserveAspectRatio="xMidYMid slice" clip-path="url(#photoCircle)"/>
  <circle cx="950" cy="315" r="150" fill="none" stroke="#334155" stroke-width="2"/>
</svg>
